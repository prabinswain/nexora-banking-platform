spring:
  application:
    name: discoveryserver
  main:
    banner-mode: off

  # config
  config:
    import: "optional:configserver:http://localhost:8070"

# Eureka configurations
eureka:
  instance:
    hostname: localhost
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka
  healthcheck:
    enabled: true
#port
server:
  port: 8761

#logging level
logging:
  level:
    root: INFO
