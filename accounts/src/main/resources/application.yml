# server related configs
server:
  port: 8080
  servlet:
    context-path: /api/v1/accounts

# spring related configs
spring:
  application:
    name: accounts
  main:
    banner-mode: off

  # DB configs
  datasource:
    url: jdbc:postgresql://localhost:5432/accounts_db
    username: ${DB_USERNAME:prabin}
    password: ${DB_PASSWORD:Pkswain@123}
    hikari:  #
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update # should be validate at production
    show-sql: true # should be false in production , Performance overhead.Sensitive data exposure.
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect # tells Hibernate Generate PostgreSQL-compatible SQL

#    flyway: # should be on in production as it handles version control
#      enabled: true
#      locations: classpath:db/migration

  #importing import from configserver
  config:
    import: "optional:configserver:http://localhost:8070"
  # activating profiles
  profiles:
    active: prod

# Eureka server configuration
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/


# Account type defaults
account:
  defaults:
    savings:
      min-balance: 1000
      interest-rate: 0.0350
    daily-limit: 200000
    monthly-limit: 1000000
  lock:
    ttl-seconds: 10



