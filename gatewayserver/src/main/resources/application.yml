spring:
  application:
    name: gatewayserver
  main:
    banner-mode: off

  # import config from config server
  config:
    import: "optional:configserver:http://localhost:8070"

# Eureka server configuration
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

server:
  port: 8072

