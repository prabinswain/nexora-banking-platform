spring:
  application:
    name: configserver
  main:
    banner-mode: off

  cloud:
    config:
      server:
        git:
          uri: https://github.com/prabinswain/EazyBank-ConfigServers
          force-pull: true

# Eureka configs
eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/


server:
  port: 8070